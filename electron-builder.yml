appId: com.spring.toever-ops
productName: Spring Toever Ops
copyright: Copyright © 2026 Spring Toever Ops

directories:
  output: release
  buildResources: resources

# Windows NSIS 설치 패키지
win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: Spring-Toever-Ops-Setup-${version}.exe

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Spring Toever Ops

# 패키지에 포함할 파일
files:
  - dist/**/*
  - dist-electron/**/*
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/node_modules/.cache/**"

# better-sqlite3 native 모듈과 playwright CLI는 asar 밖에 위치해야 함
# (better-sqlite3: native addon, playwright: child_process spawn으로 실행됨)
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/bindings/**"
  - "node_modules/file-uri-to-path/**"
  - "node_modules/playwright/**"
  - "node_modules/playwright-core/**"

# native 모듈 재빌드 (better-sqlite3)
npmRebuild: true

# 추가 리소스 (아이콘 + 번들 Chromium)
extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
      - "!.gitkeep"
  # Chromium을 설치 파일에 번들 — 설치 후 다운로드 불필요
  - from: build-browsers/
    to: browsers/
    filter:
      - "**/*"
